<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akshara Alchemist</title>
    <style>
        :root { --bg: #0f172a; --blue: #38bdf8; --gold: #fbbf24; --white: #f1f5f9; --green: #4ade80; --red: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100vh; margin: 0; overflow: hidden; background: var(--bg); color: var(--white);
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 420px; height: 100%; display: flex; flex-direction: column; padding: 10px; }
        header { text-align: center; height: 15%; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .timer { font-family: monospace; font-size: 1.3rem; color: var(--gold); margin-top: 5px; font-weight: bold; }
        
        #goal-area { text-align: center; height: 12%; display: flex; align-items: center; justify-content: center; }
        #target-text { color: var(--gold); font-size: 2.2rem; font-weight: bold; border-bottom: 3px solid #334155; }

        .game-grid { display: grid; grid-template-columns: 80px 1fr 80px; gap: 10px; height: 45%; align-items: center; }
        .bank { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--blue); border-radius: 12px;
            height: 95%; display: flex; flex-direction: column; align-items: center; padding: 5px; gap: 8px; overflow-y: auto;
        }
        .bank h3 { font-size: 0.6rem; margin: 2px; color: var(--blue); }

        .forge-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #forge-circle {
            width: 110px; height: 110px; border: 4px dashed var(--gold); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 3rem;
            background: rgba(251,191,36,0.05); transition: 0.2s; cursor: pointer;
        }

        .shake { animation: shake 0.4s; border-color: var(--red) !important; background: rgba(239, 68, 68, 0.2) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .tile {
            width: 60px; height: 60px; background: white; color: #1e293b; border-radius: 10px;
            display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold;
            box-shadow: 0 4px 0 #94a3b8; flex-shrink: 0; cursor: pointer; transition: 0.1s;
        }
        .tile:active { transform: scale(0.9); }
        .tile.m { background: var(--gold); box-shadow: 0 4px 0 #b45309; }

        #msg { font-size: 0.8rem; color: var(--green); margin-top: 10px; height: 15px; font-weight: bold; }
        #next-btn { padding: 10px 20px; background: var(--green); border: none; border-radius: 30px; font-weight: bold; color: #0f172a; margin-top: 5px; }
        
        #tray-area { height: 18%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .word-tray { display: flex; gap: 8px; }
        .slot { width: 65px; height: 65px; border: 2px dashed #475569; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; background: rgba(0,0,0,0.2); cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="timer">⏱️ <span id="clock">00:00</span></div>
        <select id="lvl" onchange="start()" style="background:#1e293b; color:white; border:1px solid var(--blue); padding: 2px 5px; border-radius: 5px;">
            <option value="1">Level 1: Fusion Lab</option>
            <option value="2">Level 2: Word Smith</option>
        </select>
    </header>

    <div id="goal-area">
        <div id="target-text">की</div>
    </div>

    <div class="game-grid">
        <div class="bank" id="v-bank"></div>
        <div class="forge-zone">
            <div id="forge-circle" onclick="handleForgeTap()">?</div>
            <div id="msg">Tap a Vyanjan</div>
            <button id="next-btn" class="hidden" onclick="moveNext()">Next →</button>
        </div>
        <div class="bank" id="m-bank"></div>
    </div>

    <div id="tray-area" class="hidden">
        <div class="word-tray" id="word-tray"></div>
    </div>
</div>

<script>
    let state = { v: "", m: "", timer: 0, interval: null, idx: 0 };

    function playAudio(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        if(type==='win'){
            osc.frequency.setValueAtTime(523, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime+0.1);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime+0.2);
        }
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime+0.3);
    }

    const level1Data = [
        {t:"की",v:["क","ल"],m:["ा","ी"]},
        {t:"मु",v:["म","स"],m:["ु","ू"]},
        {t:"दे",v:["द","र"],m:["े","ै"]}
    ];

    const level2Data = [
        {w:"किताब",p:["कि","ता","ब"],v:["क","त","ब"],m:["ि","ा"]},
        {w:"मछली",p:["म","छ","ली"],v:["म","छ","ल"],m:["ी"]},
        {w:"सूरज",p:["सू","र","ज"],v:["स","र","ज"],m:["ू"]}
    ];

    function start() {
        state.idx = 0;
        if(state.interval) clearInterval(state.interval);
        state.timer = 0;
        state.interval = setInterval(() => {
            state.timer++;
            let m = Math.floor(state.timer/60).toString().padStart(2,'0');
            let s = (state.timer%60).toString().padStart(2,'0');
            document.getElementById('clock').innerText = `${m}:${s}`;
        }, 1000);
        load();
    }

    function load() {
        const lvl = document.getElementById('lvl').value;
        const d = (lvl == "1") ? level1Data[state.idx] : level2Data[state.idx];
        
        document.getElementById('target-text').innerText = (lvl == "1") ? d.t : d.w;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('msg').innerText = "Tap a Vyanjan";
        
        state.v = ""; state.m = "";
        const circle = document.getElementById('forge-circle');
        circle.innerText = "?";
        circle.className = "";

        // Banks
        const vb = document.getElementById('v-bank'); vb.innerHTML = "<h3>VYANJAN</h3>";
        d.v.forEach(v => vb.innerHTML += `<div class="tile" onclick="selectItem('${v}','v')">${v}</div>`);
        
        const mb = document.getElementById('m-bank'); mb.innerHTML = "<h3>MATRA</h3>";
        d.m.forEach(m => mb.innerHTML += `<div class="tile m" onclick="selectItem('${m}','m')">${m}</div>`);

        const trayArea = document.getElementById('tray-area');
        if(lvl == "2") {
            trayArea.classList.remove('hidden');
            const tray = document.getElementById('word-tray');
            tray.innerHTML = "";
            d.p.forEach(part => tray.innerHTML += `<div class="slot" onclick="placeInTray('${part}', this)">?</div>`);
        } else { trayArea.classList.add('hidden'); }
    }

    function selectItem(val, type) {
        const circle = document.getElementById('forge-circle');
        circle.classList.remove('shake');

        if(type === 'v') {
            state.v = val; state.m = "";
            document.getElementById('msg').innerText = "Tap a Matra";
        } else {
            if(!state.v) { document.getElementById('msg').innerText = "Select Vyanjan first!"; return; }
            state.m = val;
        }

        const combined = state.v + state.m;
        circle.innerText = combined;

        if(document.getElementById('lvl').value == "1" && state.m !== "") {
            if(combined === level1Data[state.idx].t) victory();
            else triggerError(circle);
        }
    }

    function placeInTray(target, el) {
        const combined = state.v + state.m;
        if(combined === target) {
            el.innerText = combined;
            el.style.background = "rgba(74, 222, 128, 0.2)";
            el.style.borderColor = "var(--green)";
            state.v = ""; state.m = "";
            document.getElementById('forge-circle').innerText = "?";
            
            const slots = [...document.querySelectorAll('.slot')];
            if(slots.every(s => s.innerText !== "?")) victory();
        } else {
            triggerError(el);
            document.getElementById('msg').innerText = "Mismatch! Forge again.";
        }
    }

    function triggerError(el) {
        playAudio('error');
        el.classList.add('shake');
        setTimeout(() => {
            el.classList.remove('shake');
            // Strict reset: everything vanishes
            state.v = ""; state.m = "";
            document.getElementById('forge-circle').innerText = "?";
        }, 400);
    }

    function victory() {
        playAudio('win');
        document.getElementById('msg').innerText = "Shabash!";
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function moveNext() {
        state.idx++;
        const max = (document.getElementById('lvl').value == "1") ? level1Data.length : level2Data.length;
        if(state.idx >= max) state.idx = 0;
        load();
    }

    start();
</script>
</body>
</html>
